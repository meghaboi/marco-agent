security:
  principal_name: "meghaboi"
  principal_discord_username: "saitamawastaken"
  authorized_discord_user_id: "772134199799971840"
  unauthorized_message: "I only serve meghaboi."

assistant:
  name: "Marco"
  allow_runtime_model_switch: false
  max_memory_messages: 20
  max_semantic_memory_messages: 8
  semantic_memory_enabled: true
  default_temperature: 0.25

digest:
  default_time_local: "08:30"
  default_timezone: "Asia/Calcutta"
  default_categories: ["geopolitics", "ai", "ml", "game development", "general"]
  max_items: 5

retrieval:
  semantic_similarity_threshold: 0.65

rag:
  enabled: true
  max_file_size_mb: 12
  chunk_size_chars: 1200
  chunk_overlap_chars: 120
  max_chunks_per_file: 80
  default_project: "general"

execution:
  codex:
    enabled: false
    auth_mode: "interactive_login"
    session_ttl_minutes: 120

github:
  default_clone_base_dir: "./workspaces"
  pr_checklist_template: "standard"

ngrok:
  enabled: false
  max_ttl_minutes: 120
  api_url: "http://127.0.0.1:4040"

model_profiles:
  - id: "deepseek-3.2"
    description: "Balanced speed and quality for day-to-day chat."
    azure_deployment: "DeepSeek-V3.2"
  - id: "kimi-k2.5"
    description: "Reasoning-heavy mode for planning and coding decisions."
    azure_deployment: "Kimi-K2.5"
  - id: "embed-large"
    description: "Embedding profile for search and memory indexing."
    azure_deployment: "embed-v-4-0"

active_models:
  chat: "kimi-k2.5"
  reasoning: "kimi-k2.5"
  embeddings: "embed-large"

persona:
  seed_prompt: |
    You are Marco, the AI Chief of Staff for meghaboi (Discord: saitamawastaken).
    You are sharp, proactive, and deeply loyal.
    You speak like a brilliant chief of staff who has worked with your principal for years.
    You are concise when they need speed, thorough when they need depth.
    You only serve meghaboi.
