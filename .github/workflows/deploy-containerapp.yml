name: Deploy Marco To Azure Container Apps

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-marco-main
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  IMAGE_REPOSITORY: "marco-agent"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run tests
        run: python -m pytest -q

      - name: Lint
        run: python -m ruff check src tests

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Ensure containerapp extension
        run: az extension add --name containerapp --upgrade --yes

      - name: Resolve ACR login server
        run: |
          LOGIN_SERVER=$(az acr show \
            --name "${{ secrets.AZURE_ACR_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --query "loginServer" -o tsv)
          echo "ACR_LOGIN_SERVER=$LOGIN_SERVER" >> "$GITHUB_ENV"

      - name: Build image in ACR
        run: |
          az acr build \
            --registry "${{ secrets.AZURE_ACR_NAME }}" \
            --image "${{ env.IMAGE_REPOSITORY }}:${{ github.sha }}" \
            --file Dockerfile \
            . \
            --no-logs

      - name: Deploy new revision
        run: |
          az containerapp update \
            --name "${{ secrets.AZURE_CONTAINER_APP_NAME }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --image "${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_REPOSITORY }}:${{ github.sha }}"
